services:
  minio:
    image: minio/minio:latest
    container_name: s3_lab_minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (Web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - s3_lab_network
    restart: unless-stopped

volumes:
  minio_data:

networks:
  s3_lab_network:
    driver: bridge
